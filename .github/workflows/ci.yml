name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Older runs on the same ref get cancelled when a new commit arrives, so a
# fast `git push --force-with-lease` doesn't pile up wasted CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # .next/cache holds Turbopack incremental artifacts. Keying on source
      # files plus the lockfile means CI gets a warm cache on most pushes
      # but invalidates as soon as deps or source change.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,css}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      # --legacy-peer-deps because next@16 pins @swc/helpers@0.5.15 while
      # next-intl's nested @swc/core asks for >=0.5.17 as an optional peer.
      # Local npm logs a warning and moves on; CI's stricter npm refuses
      # `npm ci` without the flag.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
